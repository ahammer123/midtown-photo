# Permanent public site (free): GitHub Pages via Actions.
#
# One-time on github.com (repo must be PUBLIC on a free account):
#   Settings → Pages → Build: GitHub Actions → save
#
# Then push this folder as the repo root (branch main). URL will be:
#   https://<your-username>.github.io/<repo-name>/
#
name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - id: deployment
        uses: actions/deploy-pages@v4
