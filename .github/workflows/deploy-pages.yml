# Permanent public site (free): GitHub Pages via Actions.
#
# REQUIRED one-time: Repo → Settings → Pages → Build and deployment →
#   Source: "GitHub Actions" (not "Deploy from a branch").
#
# Project site URL (note the repo name path):
#   https://ahammer123.github.io/midtown-photo/
#
name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
