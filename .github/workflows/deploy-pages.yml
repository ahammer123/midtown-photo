# Live URL: https://ahammer123.github.io/midtown-photo/
#
# If deploy fails with "Creating Pages deployment failed" / Not Found:
#   Repo → Settings → Pages → Build and deployment → Source → GitHub Actions → Save
#   Then re-run this workflow (Actions → failed run → Re-run jobs).
#
name: Deploy static site to Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
